# 로컬 개발용. 배포 서버는 deploy/compose.prod.yaml을 쓴다.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: archive
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: archive
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://db:5432/archive
      DB_USER: archive
      DB_PASSWORD: archive
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:8000}
      CORS_ORIGINS: http://localhost:5173
      JWT_SECRET: dev-only-secret-change-me-at-least-32-bytes
    ports:
      - "8080:8080"

volumes:
  pgdata:
